name: Build KivyMD APK (Fixed Licenses)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código de tu repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instalar las dependencias de Ubuntu que Kivy y Buildozer necesitan
      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            libncursesw5-dev \
            libffi-dev \
            uuid-dev \
            libnuma-dev

      # 4. Instalar Buildozer y Cython via Pip
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # 5. CORRECCIÓN: Crear la carpeta de Android SDK y aceptar licencias automáticamente
      - name: Accept Android SDK Licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          # Este comando pre-acepta los términos legales enviando "y" de forma automática
          yes | sdkmanager --licenses || true

      # 6. Ejecutar Buildozer para compilar el APK
      - name: Build APK with Buildozer
        run: |
          # El comando 'yes |' simula que presionas "y" automáticamente si Buildozer vuelve a preguntar por licencias
          yes | buildozer android debug

      # 7. Guardar y subir el APK para que lo descargues
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KivyMD-App-Fixed-APK
          path: bin/*.apk
          if-no-files-found: error
