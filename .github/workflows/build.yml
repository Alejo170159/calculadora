name: Build KivyMD APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código de tu repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Versión estable y recomendada para Kivy/Buildozer en 2026

      # 3. Compilar el APK usando la acción oficial de Buildozer
      - name: Build with Buildozer
        uses: ArtemGovorov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      # 4. Subir el APK generado para que lo puedas descargar
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KivyMD-App-APK
          path: bin/*.apk
          if-no-files-found: error
