name: Build KivyMD APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código de tu repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar la versión recomendada de Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instalar dependencias completas del sistema Ubuntu para Kivy
      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            libncursesw5-dev \
            libffi-dev \
            uuid-dev \
            libnuma-dev \
            openjdk-17-jdk

      # 4. Instalar Buildozer y Cython
      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython virtualenv

      # 5. Pre-aceptar los acuerdos de licencia de Android SDK
      - name: Pre-accept Android SDK Licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n247c16e68235281a7de769d2093d7459227d726c" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb74314b75a24875c972" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license

      # 6. Forzar una compilación limpia (Clean) y compilar en modo Debug con Log Nivel 2
      - name: Build APK with Buildozer
        env:
          ANDROID_SDK_CREDENTIALS: yes
          ACCEPT_SDK_LICENSES: y
        run: |
          buildozer android clean
          buildozer android debug --bdo_accept_licenses=y log_level=2

      # 7. Guardar el APK resultante para descargarlo en la sección "Artifacts"
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KivyMD-Calculadora-APK
          path: bin/*.apk
          if-no-files-found: error
