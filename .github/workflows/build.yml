name: Build KivyMD APK (Aidl Fix)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Instalar las dependencias de Ubuntu
      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            libncursesw5-dev \
            libffi-dev \
            uuid-dev \
            libnuma-dev \
            openjdk-17-jdk

      # 4. Instalar Buildozer y Cython
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      # 5. Limpiar cualquier rastro de instalaciones fallidas previas
      - name: Clean Buildozer leftovers
        run: |
          rm -rf ~/.buildozer/android/platform/android-sdk

      # 6. Compilar forzando la aceptación de licencias global
      - name: Build APK with Buildozer
        env:
          # Esta variable acepta los términos del SDK de Android antes de que Buildozer empiece a descargar
          ACCEPT_SDK_LICENSES: "y"
        run: |
          buildozer android debug

      # 7. Guardar y subir el APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KivyMD-Calculadora-APK
          path: bin/*.apk
          if-no-files-found: error
